# Production environment — am-db-agent
environment: production
replicaCount: 2

resources:
  limits:
    cpu: 1500m
    memory: 1024Mi
  requests:
    cpu: 250m
    memory: 512Mi

vault:
  enabled: true
  secretPaths:
    postgres:
      path: "apps/data/prod/infra/postgres"
    mongodb:
      path: "apps/data/prod/infra/mongodb"
    redis:
      path: "apps/data/prod/infra/redis"
    kafka:
      path: "apps/data/prod/infra/kafka"
    identity-oidc:
      path: "apps/data/prod/services/am-identity"
    observability:
      path: "apps/data/prod/services/am-mcp-gateway"
    llm-api-keys:
      path: "apps/data/prod/services/am-mcp-gateway"

ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-prod-global-cors@kubernetescrd,
      am-apps-prod-strip-prefix-apps@kubernetescrd
  hosts:
    - host: am.asrax.in
      paths:
        - path: /db
          pathType: Prefix

env:
  APP_ENV: production
  LOG_LEVEL: INFO
  MCP_GATEWAY_BASE_URL: "http://am-mcp-gateway.am-apps-prod.svc.cluster.local:8120"
  QDRANT_URL: "https://qdrant.munish.org"
  KAFKA_UI_URL: "https://am.munish.org/kafka-ui"
  KAFKA_UI_CLUSTER: am-prod
  KEYCLOAK_TOKEN_URL: "http://auth.munish.org/auth/realms/am-prod-realm/protocol/openid-connect/token"
  DB_AGENT_ALLOW_WRITES: "false"
