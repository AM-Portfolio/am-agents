name: AM Tool Agent Publish

on:
  push:
    branches: ["main", "develop", "test/**", "feature/**", "hotfix/**", "fix/**"]
    paths:
      - "tool-agent/**"
      - ".dockerignore"
  pull_request:
    branches: ["main", "develop", "test/**", "feature/**", "hotfix/**", "fix/**"]
    paths:
      - "tool-agent/**"
      - ".dockerignore"
  workflow_dispatch:

jobs:
  test:
    name: Test tool-agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tool-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests tools/mongodb/tests tools/postgres/tests tools/redis/tests tools/kafka/tests tools/qdrant/tests -q --import-mode=importlib
      - run: sh scripts/check-db-agent-untouched.sh

  publish:
    name: Publish AM Tool Agent
    needs: test
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: "python"
      working_directory: "tool-agent"
      image_name: "am-tool-agent"
      build_context: "."
      preprod_namespace: "am-apps-preprod"
      prod_namespace: "am-apps-prod"
      deploy_dev: true
      deploy_prod: true
    secrets: inherit
