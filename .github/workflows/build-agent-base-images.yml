name: Build Agent Base Images

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "docker/Dockerfile.ui-test-agent-base"
      - "ui-test-agent/requirements.txt"
  workflow_dispatch:

jobs:
  ui-test-agent-base:
    name: am-ui-test-agent-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push Playwright base
        run: |
          IMAGE_ID="ghcr.io/${{ github.repository_owner }}/am-ui-test-agent-base"
          IMAGE_ID=$(echo "$IMAGE_ID" | tr '[:upper:]' '[:lower:]')
          echo "Building $IMAGE_ID ..."
          docker build \
            -f docker/Dockerfile.ui-test-agent-base \
            -t "$IMAGE_ID:latest" \
            -t "$IMAGE_ID:${{ github.sha }}" \
            .
          docker push "$IMAGE_ID:latest"
          docker push "$IMAGE_ID:${{ github.sha }}"
