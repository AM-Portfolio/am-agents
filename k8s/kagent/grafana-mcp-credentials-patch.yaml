apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagent-grafana-mcp
  namespace: kagent
spec:
  template:
    spec:
      containers:
        - name: grafana-mcp
          env:
            - name: GRAFANA_URL
              value: http://grafana.monitoring.svc.cluster.local:3000
            - name: GRAFANA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-readonly
                  key: admin-user
            - name: GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-readonly
                  key: admin-password
