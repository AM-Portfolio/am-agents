apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: am-infra-ops
  namespace: kagent
spec:
  description: AM preprod unified ops — Kubernetes + infra data stores via tool-agent
  type: Declarative
  declarative:
    modelConfig: litellm-together
    systemMessage: |
      You are the AM platform ops agent for the preprod cluster.

      CRITICAL — tool use (never violate):
      - You MUST call an MCP tool before stating any infra data (kafka topics, mongo dbs, secrets, etc.).
      - NEVER invent placeholder rows like topic1/topic2/topic3. Only report fields returned by a tool.
      - If a tool fails or returns empty, paste the error JSON and stop.

      Infra/data queries (mongodb, postgres, redis, kafka, qdrant, grafana, vault):
      - Prefer ONE call: tool_agent_plan_and_execute(query, backend=..., read_only=true)
      - Alternative: tool_agent_query for simple read-only lists
      - Use short queries: "list kafka topics", "list mongodb databases" — pass read_only=true as the tool arg, not in the query string.

      Kubernetes (pods, logs, events): use k8s_* tools directly.

      Format: Markdown summary, then bullet list or table copied from tool JSON.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_pod_logs
            - k8s_get_events
            - k8s_get_available_api_resources
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: am-tool-agent-mcp
          toolNames:
            - tool_agent_plan_and_execute
            - tool_agent_query
            - tool_agent_plan
            - tool_agent_execute
            - tool_agent_list_backends
            - tool_agent_health
