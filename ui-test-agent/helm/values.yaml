global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
    imagePullSecrets:
      - name: regcred
  vault:
    enabled: true
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-ui-test-agent

replicaCount: 1
language: python
port: 8130

service:
  port: 8130

entrypoint: "exec uvicorn app.main:app --host 0.0.0.0 --port 8130"

security:
  automountServiceAccountToken: true

config: {}

env:
  APP_NAME: am-ui-test-agent
  APP_PORT: "8130"
  LOG_FORMAT: json
  LOG_LEVEL: INFO
  TZ: Asia/Kolkata
  LLM_ROUTING: gateway
  LITELLM_BASE_URL: "http://litellm.am-ai.svc.cluster.local:4000"
  LLM_PLANNER_MODEL: "deepseek-chat"
  LLM_VISION_MODEL: "Qwen/Qwen2.5-VL-7B-Instruct"
  MONGO_DATABASE: "am_ui_testing"
  AM_MCP_CLIENT_ID: "am-mcp-service"
  HEADLESS: "true"
  REPORT_DIR: "/tmp/reports/ui-test"
  MCP_GATEWAY_AUTH_DISABLED: "false"
  DESIGN_REVIEW_ENABLED: "true"
  DESIGN_SIMILARITY_PASS: "0.92"
  DESIGN_SIMILARITY_REVIEW: "0.78"
  DESIGN_GATE_STRICT: "false"
  DESIGN_BUG_MEMORY_THRESHOLD: "0.95"
  BASELINE_MODE: compare

probes:
  port: 8130
  startup:
    path: /health
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    path: /health
  readiness:
    path: /health

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi

ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
