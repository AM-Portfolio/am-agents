global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
    imagePullSecrets:
      - name: regcred
  vault:
    enabled: true
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-ui-test-agent

replicaCount: 1
language: python
port: 8130

service:
  port: 8130

entrypoint: "exec uvicorn app.main:app --host 0.0.0.0 --port 8130"

security:
  automountServiceAccountToken: true

config: {}

env:
  APP_ENV: production
  APP_NAME: am-ui-test-agent
  APP_PORT: "8130"
  LOG_FORMAT: json
  LOG_LEVEL: INFO
  TZ: Asia/Kolkata
  MCP_GATEWAY_BASE_URL: "http://am-mcp-gateway.am-apps-preprod.svc.cluster.local:8120"
  MCP_GATEWAY_AUTH_DISABLED: "false"
  LLM_ROUTING: "gateway"
  LITELLM_BASE_URL: "http://litellm.am-ai.svc.cluster.local:4000"
  LLM_PLANNER_MODEL: "deepseek-chat"
  LLM_VISION_MODEL: "Qwen/Qwen2.5-VL-7B-Instruct"
  QDRANT_HOST: "qdrant.am-ai.svc.cluster.local"
  QDRANT_PORT: "6333"
  MONGO_DATABASE: "am_ui_testing"
  KEYCLOAK_TOKEN_URL: "http://auth.munish.org/auth/realms/am-preprod-realm/protocol/openid-connect/token"
  AM_MCP_CLIENT_ID: "am-mcp-service"
  HEADLESS: "true"
  REPORT_DIR: "/data/reports/ui-test"

probes:
  port: 8130
  startup:
    path: /health
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    path: /health
  readiness:
    path: /health

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi

ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-preprod-global-cors@kubernetescrd,
      am-apps-preprod-strip-prefix-apps@kubernetescrd
  hosts:
    - host: am.asrax.in
      paths:
        - path: /ui-test
          pathType: Prefix
