global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
    imagePullSecrets:
      - name: regcred
  vault:
    enabled: true
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-tool-agent

replicaCount: 1
language: python
port: 8141

service:
  port: 8141

entrypoint: "exec uvicorn app.main:app --host 0.0.0.0 --port 8141"

security:
  automountServiceAccountToken: true

config: {}

env:
  APP_NAME: am-tool-agent
  APP_PORT: "8141"
  LOG_FORMAT: json
  LOG_LEVEL: INFO
  TZ: Asia/Kolkata
  LLM_ROUTING: gateway
  LITELLM_BASE_URL: "http://litellm.am-ai.svc.cluster.local:4000"
  LLM_PLANNER_MODEL: "together_ai/meta-llama/Meta-Llama-3-8B-Instruct-Lite"
  LLM_INTENT_ENABLED: "true"
  LLM_SUMMARY_ENABLED: "true"
  PROMPT_SOURCE: langfuse
  MCP_GATEWAY_AUTH_DISABLED: "false"
  AM_MCP_CLIENT_ID: "am-mcp-service"
  MCP_ENABLED: "false"
  MCP_DEPLOYMENT_MODE: self_hosted
  MCP_UNIVERSAL_GATEWAY: toolbox
  TOOLBOX_URL: "http://mcp-toolbox.infra.svc.cluster.local:5000"
  TOOL_AGENT_READ_ONLY_DEFAULT: "true"
  TOOL_AGENT_ALLOW_WRITES: "false"
  TOOL_AGENT_MAX_ROWS: "100"
  TOOL_AGENT_TIMEOUT_SECONDS: "30"
  TOOL_AGENT_INTENT_MIN_CONFIDENCE: "0.55"
  TOOL_AGENT_REQUIRE_BACKEND_FOR_AGENTS: "true"
  LANGFUSE_ENABLED: "true"
  LANGFUSE_HOST: "https://langfuse.munish.org"
  LANGFUSE_TRACE_MAX_OUTPUT_CHARS: "8000"

probes:
  port: 8141
  startup:
    path: /health
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    path: /health
  readiness:
    path: /ready

resources:
  limits:
    cpu: 1000m
    memory: 768Mi
  requests:
    cpu: 150m
    memory: 384Mi

ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
