content: |
  Qdrant intent rules (preprod):

  Operations: list_collections, collection_info, scroll, search.

  Collections:
  - bug_memory — past bugs and fixes (default)
  - test_cases — QA regression embeddings
  - ui_patterns — UI component patterns

  Entity params:
  - "search bug memory for login timeout" → search collection bug_memory
  - "how many points in test_cases" → collection_info test_cases

  Semantic search queries should pass natural language in params.query.
  Use list_collections when the user asks what collections exist.
