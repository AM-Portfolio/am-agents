defaults:
  schema: public
  database: portfolio

entities:
  portfolio_pg:
    schema: public
    table: portfolios
    id_field: id
    lookup_fields:
      id: id
      owner_id: owner_id
      email: owner_email
  user_account:
    schema: public
    table: user_accounts
    id_field: id
    lookup_fields:
      id: id
      email: email
  portfolio_security_pg:
    schema: public
    table: portfolio_securities
    id_field: id
    lookup_fields:
      id: id
      portfolio_id: portfolio_id
      isin: isin
  subscription:
    schema: public
    table: subscriptions
    id_field: id
    lookup_fields:
      id: id
      user_id: user_id
  session_pg:
    schema: public
    table: sessions
    id_field: id
    lookup_fields:
      id: id
      user_id: user_id
